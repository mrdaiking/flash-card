<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#6366f1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FlashCards">
  <title>Felix Cards</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            surface: '#1e293b',
            base: '#0f172a',
          }
        }
      }
    }
  </script>
  <style>
    body { background-color: #0f172a; -webkit-tap-highlight-color: transparent; }
    .card-scene { perspective: 1000px; }
    .card-inner {
      transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1);
      transform-style: preserve-3d;
      position: relative;
    }
    .card-inner.flipped { transform: rotateY(180deg); }
    .card-front, .card-back {
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }
    .card-back { transform: rotateY(180deg); }
    .safe-bottom { padding-bottom: max(env(safe-area-inset-bottom), 0px); }
    .prose-content img { max-width: 100%; border-radius: 0.5rem; }
    .prose-content pre { background: #0f172a; padding: 0.75rem; border-radius: 0.5rem; overflow-x: auto; margin: 0.5rem 0; }
    .prose-content code { font-size: 0.85em; background: #0f172a; padding: 0.1em 0.3em; border-radius: 0.25rem; }
    .prose-content pre code { background: transparent; padding: 0; }
    .prose-content p { margin: 0.25rem 0; }
  </style>
</head>
<body class="text-slate-100 min-h-screen select-none">

  <!-- Auth Screen -->
  <div id="auth-screen" class="hidden fixed inset-0 bg-base flex items-center justify-center z-50 p-4">
    <div class="bg-surface rounded-2xl p-8 w-full max-w-sm shadow-2xl">
      <div class="text-center mb-8">
        <div class="w-16 h-16 bg-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
          <span class="text-white text-2xl font-bold">FC</span>
        </div>
        <h1 class="text-2xl font-bold text-white">Felix Cards</h1>
        <p class="text-slate-400 mt-1 text-sm">Enter your PIN to continue</p>
      </div>
      <input
        id="pin-input"
        type="password"
        inputmode="numeric"
        placeholder="PIN"
        autocomplete="current-password"
        class="w-full bg-base border border-slate-700 rounded-xl px-4 h-12 text-white text-center text-xl tracking-widest focus:outline-none focus:border-indigo-500 mb-4"
      />
      <button
        id="pin-submit"
        class="w-full h-12 bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700 rounded-xl font-semibold text-white transition-colors"
      >Unlock</button>
      <p id="pin-error" class="text-red-400 text-center mt-3 text-sm hidden">Wrong PIN. Try again.</p>
    </div>
  </div>

  <!-- App -->
  <div id="app" class="pb-20 min-h-screen"></div>

  <!-- Bottom Nav -->
  <nav id="bottom-nav" class="hidden fixed bottom-0 left-0 right-0 bg-surface border-t border-slate-700/60 safe-bottom z-40">
    <div class="flex">
      <button onclick="navigate('#/')" class="flex-1 flex flex-col items-center py-2.5 gap-1 text-slate-400 hover:text-white transition-colors nav-item" data-route="">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>
        <span class="text-xs">Home</span>
      </button>
      <button onclick="navigate('#/study/all')" class="flex-1 flex flex-col items-center py-2.5 gap-1 text-slate-400 hover:text-white transition-colors nav-item" data-route="study">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
        </svg>
        <span class="text-xs">Study All</span>
      </button>
      <button onclick="navigate('#/stats')" class="flex-1 flex flex-col items-center py-2.5 gap-1 text-slate-400 hover:text-white transition-colors nav-item" data-route="stats">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
        </svg>
        <span class="text-xs">Stats</span>
      </button>
    </div>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
